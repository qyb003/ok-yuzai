# ============================================================================
# Hyper Alpha Arena — 开发模式热重载配置
# ============================================================================
# 使用方法（开发）:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# 使用方法（生产）:
#   docker compose up -d    （只加载 docker-compose.yml，不加载本文件）
#
# 热重载特性:
#   - 后端 Python 文件修改 → uvicorn --reload 自动重启（约2秒）
#   - 前端 TSX/CSS 文件修改 → Vite HMR 浏览器即时刷新（<1秒）
#   - 前端端口 5173（Vite dev server），后端端口 8802（不变）
# ============================================================================

services:
  # ========================
  # 后端：改为热重载模式
  # ========================
  app:
    # 挂载整个后端目录（覆盖逐个子目录的挂载）
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
      - app_data:/app/data

    # 启动命令：添加 --reload 开启热重载
    command: >
      sh -c "mkdir -p /app/data &&
      if [ ! -f /app/data/.encryption_key ]; then
        python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())' > /app/data/.encryption_key;
      fi &&
      export HYPERLIQUID_ENCRYPTION_KEY=$$(cat /app/data/.encryption_key) &&
      python -m database.init_postgresql || true &&
      python database/init_hyperliquid_tables.py || true &&
      python database/init_snapshot_db.py || true &&
      python database/migration_manager.py || true &&
      pip install -e /app/backend &&
      python -m uvicorn main:app --host 0.0.0.0 --port 8802 --reload --reload-dir /app/backend"

    # 暴露后端端口
    ports:
      - "127.0.0.1:8802:8802"

    # 去掉 build 依赖（使用已有镜像）
    # 如果镜像不存在，先 docker compose build app

  # ========================
  # 前端：Vite 开发服务器（HMR 即时刷新）
  # ========================
  frontend:
    image: node:18-alpine
    container_name: hyper-arena-frontend-dev
    working_dir: /app/frontend

    # 挂载前端源码
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules

    # 安装依赖并启动 Vite dev server
    command: >
      sh -c "npm install -g pnpm &&
      pnpm install &&
      pnpm dev --host 0.0.0.0 --port 5173"

    ports:
      - "127.0.0.1:5173:5173"

    # 与后端同网络
    networks:
      - hyper-arena-network

    # Vite 代理配置: /api 请求转发到后端容器
    environment:
      VITE_API_TARGET: http://app:8802

networks:
  hyper-arena-network:   # 继承 docker-compose.yml 的网络定义

volumes:
  app_data:           # 继承 docker-compose.yml 的 driver: local 定义
  frontend_node_modules:
